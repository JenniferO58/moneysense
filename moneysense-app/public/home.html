<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneySense AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0A0C;
    --surface: #18181B;
    --surface-hover: #212124;
    --surface-border: rgba(255,255,255,0.07);
    --ink: #F5F5F4;
    --ink-secondary: #98989F;
    --ink-muted: #67676D;
    --accent: #E8794F;
    --accent-deep: #C8502F;
  }

  html { overflow-x: hidden; width: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  .glow {
    position: fixed;
    top: -120px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(232,121,79,0.14) 0%, transparent 70%);
    pointer-events: none;
  }

  .screen {
    display: none;
    position: relative;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  .content { padding: 24px 20px 0; flex: 1; display: flex; flex-direction: column; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .greeting { font-size: 19px; color: var(--ink); font-weight: 700; letter-spacing: -0.3px; }
  .profile-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #17100A;
  }

  .question { font-size: 14px; color: var(--ink-secondary); margin-bottom: 14px; font-style: italic; }

  .answer { font-size: 19px; line-height: 1.55; font-weight: 460; letter-spacing: -0.2px; }
  .answer .num { font-weight: 780; color: var(--accent); font-variant-numeric: tabular-nums; }

  .stat-block {
    margin-top: 32px; background: rgba(255,255,255,0.02); border-radius: 14px;
    padding: 4px 14px;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-key { font-size: 12.5px; color: var(--ink-secondary); }
  .stat-val { font-size: 12.5px; color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

  .next-step {
    margin-top: 34px; padding-left: 14px; border-left: 3px solid var(--accent);
  }
  .next-step-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent); font-weight: 700; margin-bottom: 8px;
  }
  .next-step-text {
    font-size: 13.5px; line-height: 1.55; color: var(--ink-secondary);
  }

  .ask-input {
    display: flex; align-items: center; gap: 10px;
    background: transparent; border: 1px solid var(--surface-border);
    border-radius: 100px; padding: 13px 14px 13px 18px;
    margin-top: 28px; cursor: pointer;
  }
  .ask-input span { font-size: 13px; color: var(--ink-secondary); flex: 1; }
  .ask-send {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--accent); background: transparent;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .ask-send svg { width: 12px; height: 12px; color: var(--accent); }

  .nav-dock {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    max-width: 380px; width: calc(100% - 44px);
    background: rgba(24,24,27,0.85);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px; padding: 8px 10px;
    display: flex; align-items: center; justify-content: space-around;
    box-shadow: 0 16px 36px -6px rgba(0,0,0,0.5);
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--ink-muted); opacity: 0.4; transition: opacity 0.2s; }
  .nav-item.active { color: var(--ink); opacity: 1; }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-item span { font-size: 10px; font-weight: 600; }
  .nav-add {
    width: 42px; height: 42px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(232,121,79,0.28); flex-shrink: 0; border: none; cursor: pointer;
    opacity: 1;
  }
  .nav-add svg { width: 18px; height: 18px; color: #17100A; }

  .bottom-spacer { height: 120px; }

  /* Loading state */
  .loading-screen {
    display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .loading-screen.active { display: flex; }
  .loading-ring {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px solid var(--surface);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Add-expense bottom sheet */
  .sheet-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 10;
  }
  .sheet-overlay.active { display: block; }
  .sheet {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    max-width: 420px; width: 100%; background: var(--bg);
    border: 1px solid var(--surface-border); border-top: 1px solid var(--surface-border);
    border-radius: 24px 24px 0 0; padding: 24px 20px; z-index: 11;
    display: none;
  }
  .sheet.active { display: block; }
  .sheet h2 { font-size: 18px; font-weight: 650; margin-bottom: 16px; }
  .sheet input {
    width: 100%; padding: 14px; font-size: 16px; border: 1px solid var(--surface-border);
    border-radius: 12px; margin-bottom: 10px; background: var(--surface); color: var(--ink);
  }
  .sheet input::placeholder { color: var(--ink-muted); }
  .sheet-category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
  .sheet-chip {
    padding: 10px 4px; border: 1px solid var(--surface-border); border-radius: 10px;
    text-align: center; font-size: 12px; cursor: pointer; background: var(--surface); color: var(--ink);
  }
  .sheet-chip.selected { background: var(--accent); color: #17100A; font-weight: 600; border-color: var(--accent); }
  .sheet button.primary {
    width: 100%; padding: 15px; background: var(--accent); color: #17100A;
    border: none; border-radius: 14px; font-size: 15px; font-weight: 650; cursor: pointer;
  }
  .sheet-status { font-size: 13px; color: var(--ink-muted); margin-top: 10px; text-align: center; }

</style>
</head>
<body>

<div class="glow"></div>

<div class="loading-screen active" id="loadingScreen">
  <div class="loading-ring"></div>
</div>

<div class="screen" id="homeScreen">
  <div class="content">

    <div class="topbar">
      <div class="greeting" id="greetingText">Good morning</div>
      <div class="profile-dot" id="profileDot"></div>
    </div>

    <div class="question">How's my money looking this month?</div>

    <div class="answer" id="answerText">—</div>

    <div class="stat-block">
      <div class="stat-row"><span class="stat-key">Top category</span><span class="stat-val" id="statTopCategory">—</span></div>
      <div class="stat-row"><span class="stat-key">Vs. last month</span><span class="stat-val" id="statVsLastMonth">—</span></div>
      <div class="stat-row"><span class="stat-key">Comfortable range</span><span class="stat-val" id="statComfortRange">—</span></div>
    </div>

    <div class="next-step">
      <div class="next-step-label">What I'd do next</div>
      <div class="next-step-text" id="nextStepText">—</div>
    </div>

    <div class="ask-input" onclick="window.location.href='/ask.html'">
      <span>Ask a follow-up…</span>
      <div class="ask-send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 14 0M13 6l6 6-6 6"/></svg>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>
</div>

<div class="nav-dock" id="navDock" style="display:none;">
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
    <span>Home</span>
  </div>
  <div class="nav-item" onclick="window.location.href='/insights.html'" style="cursor:pointer;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 14l4-4 4 4 5-6"/></svg>
    <span>Insights</span>
  </div>
  <div class="nav-item" onclick="window.location.href='/checkin.html'" style="cursor:pointer;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    <span>Check-in</span>
  </div>
  <button class="nav-add" onclick="openSheet()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="addSheet">
  <h2>Add an expense</h2>
  <input id="sheetAmount" type="number" placeholder="Amount" />
  <div class="sheet-category-grid" id="sheetCategoryGrid"></div>
  <input id="sheetNote" type="text" placeholder="Note (optional)" />
  <button class="primary" onclick="submitExpense()">Add</button>
  <div class="sheet-status" id="sheetStatus"></div>
</div>

<script>
  const SUPABASE_URL = 'https://grsrjczmrmtstbsezbxj.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gp0oWf_Ao0N9UxOwtKxi9g_-U23nCyL';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let categories = [];
  let selectedSheetCategoryId = null;

  const RANGE_LABELS = {
    under100: 'Under £100/wk',
    '100to250': '£100–250/wk',
    '250to500': '£250–500/wk',
    '500plus': '£500+/wk'
  };

  function showLoading() {
    document.getElementById('loadingScreen').classList.add('active');
    document.getElementById('homeScreen').classList.remove('active');
    document.getElementById('navDock').style.display = 'none';
    window.scrollTo(0, 0);
  }

  function showHome() {
    document.getElementById('loadingScreen').classList.remove('active');
    document.getElementById('homeScreen').classList.add('active');
    document.getElementById('navDock').style.display = 'flex';
    window.scrollTo(0, 0);
  }

  function setGreeting(fullName) {
    const hour = new Date().getHours();
    const timeGreeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    const firstName = fullName ? fullName.trim().split(/\s+/)[0] : null;
    document.getElementById('greetingText').textContent = firstName ? `${timeGreeting}, ${firstName}` : timeGreeting;
  }

  function setProfileInitial(fullName) {
    const initial = fullName ? fullName.trim().charAt(0).toUpperCase() : '';
    document.getElementById('profileDot').textContent = initial;
  }

  async function loadCategories() {
    const { data } = await supabaseClient.from('categories').select('*').order('sort_order');
    categories = data ?? [];
    const grid = document.getElementById('sheetCategoryGrid');
    grid.innerHTML = categories.map(c =>
      `<div class="sheet-chip" data-id="${c.id}" onclick="selectSheetCategory('${c.id}')">${c.name}</div>`
    ).join('');
  }

  function selectSheetCategory(id) {
    selectedSheetCategoryId = id;
    document.querySelectorAll('.sheet-chip').forEach(el =>
      el.classList.toggle('selected', el.dataset.id === id)
    );
  }

  function openSheet() {
    document.getElementById('sheetOverlay').classList.add('active');
    document.getElementById('addSheet').classList.add('active');
  }
  function closeSheet() {
    document.getElementById('sheetOverlay').classList.remove('active');
    document.getElementById('addSheet').classList.remove('active');
    document.getElementById('sheetStatus').textContent = '';
  }

  async function submitExpense() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;

    const amount = parseFloat(document.getElementById('sheetAmount').value);
    const note = document.getElementById('sheetNote').value;
    const statusEl = document.getElementById('sheetStatus');

    if (!amount || !selectedSheetCategoryId) {
      statusEl.textContent = 'Add an amount and category to continue.';
      return;
    }

    const res = await fetch('/api/transactions/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ amount, category_id: selectedSheetCategoryId, note })
    });

    if (res.ok) {
      statusEl.textContent = 'Added';
      document.getElementById('sheetAmount').value = '';
      document.getElementById('sheetNote').value = '';
      selectedSheetCategoryId = null;
      document.querySelectorAll('.sheet-chip').forEach(el => el.classList.remove('selected'));

      setTimeout(async () => {
        closeSheet();
        showLoading();
        await loadHomeData();
      }, 500);
    } else {
      statusEl.textContent = 'Something went wrong — try again.';
    }
  }

  async function loadHomeData() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      window.location.href = '/onboarding.html';
      return;
    }

    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().split('T')[0];
    const prevMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0).toISOString().split('T')[0];

    // Current month transactions, with category names for the top-category stat
    const { data: transactions } = await supabaseClient
      .from('transactions')
      .select('amount, categories(name)')
      .eq('user_id', session.user.id)
      .gte('spent_on', monthStart);

    const total = (transactions ?? []).reduce((s, t) => s + Number(t.amount), 0);

    // Top category this month
    const catTotals = {};
    (transactions ?? []).forEach(t => {
      const name = t.categories?.name ?? 'Other';
      catTotals[name] = (catTotals[name] ?? 0) + Number(t.amount);
    });
    const topCat = Object.entries(catTotals).sort((a, b) => b[1] - a[1])[0];
    document.getElementById('statTopCategory').textContent = topCat
      ? `${topCat[0]} · £${topCat[1].toFixed(0)}`
      : 'Not enough data';

    // Previous month total, for the comparison stat
    const { data: prevTransactions } = await supabaseClient
      .from('transactions')
      .select('amount')
      .eq('user_id', session.user.id)
      .gte('spent_on', prevMonthStart)
      .lte('spent_on', prevMonthEnd);

    const prevTotal = (prevTransactions ?? []).reduce((s, t) => s + Number(t.amount), 0);
    let vsLastMonthText = 'No prior data yet';
    if (prevTotal > 0) {
      const diff = total - prevTotal;
      const pctDiff = Math.abs(diff / prevTotal);
      if (pctDiff < 0.1) vsLastMonthText = 'About the same';
      else if (diff > 0) vsLastMonthText = 'Higher than last month';
      else vsLastMonthText = 'Lower than last month';
    }
    document.getElementById('statVsLastMonth').textContent = vsLastMonthText;

    // Comfortable range, from onboarding
    const { data: profile } = await supabaseClient
      .from('users')
      .select('weekly_comfortable_range')
      .eq('id', session.user.id)
      .maybeSingle();
    document.getElementById('statComfortRange').textContent =
      RANGE_LABELS[profile?.weekly_comfortable_range] ?? 'Not set yet';

    // Real AI response — summary embedded into the answer sentence with the number
    try {
      const res = await fetch('/api/summary/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` }
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('answerText').innerHTML =
          `You've spent <span class="num">£${total.toFixed(0)}</span> this month — ${data.summary ?? ''}`;
        document.getElementById('nextStepText').textContent = data.next_step ?? '—';
      } else {
        document.getElementById('answerText').innerHTML = `You've spent <span class="num">£${total.toFixed(0)}</span> this month.`;
        document.getElementById('nextStepText').textContent = "We'll have your next step ready shortly.";
      }
    } catch (err) {
      document.getElementById('answerText').innerHTML = `You've spent <span class="num">£${total.toFixed(0)}</span> this month.`;
      document.getElementById('nextStepText').textContent = "We'll have your next step ready shortly.";
    }

    showHome();
  }

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      const { data: profile } = await supabaseClient
        .from('users')
        .select('full_name')
        .eq('id', session.user.id)
        .maybeSingle();
      setGreeting(profile?.full_name);
      setProfileInitial(profile?.full_name);
    } else {
      setGreeting();
    }
    await loadCategories();
    await loadHomeData();
  }

  init();
</script>

</body>
</html>
