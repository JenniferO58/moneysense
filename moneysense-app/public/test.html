<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoneySense AI — Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
  input, select, button { display: block; width: 100%; padding: 10px; margin: 8px 0; font-size: 15px; }
  button { background: #1C1C1E; color: white; border: none; border-radius: 8px; cursor: pointer; }
  #status { color: #888; font-size: 13px; margin-top: 10px; }
  #transactionList { margin-top: 20px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<h2>Step 1: Sign in</h2>
<input id="email" type="email" placeholder="your@email.com" />
<button onclick="signIn()">Send magic link</button>
<div id="authStatus"></div>

<p style="font-size:13px; color:#888;">— or, if you've set a password —</p>
<input id="password" type="password" placeholder="Password" />
<button onclick="signInWithPassword()" style="background:#48484A;">Sign in with password</button>

<h2>Step 2: Add a transaction</h2>
<input id="amount" type="number" placeholder="Amount" step="0.01" />
<select id="category"></select>
<div id="catError" style="color:#C0392B; font-size:13px;"></div>
<input id="note" type="text" placeholder="Note (optional)" />
<button onclick="addTransaction()">Add transaction</button>
<div id="status"></div>

<div id="transactionList"></div>

<h2>Step 3: Generate AI summary</h2>
<button onclick="generateSummary()" style="background:#2E7D32;">Generate my summary</button>
<div id="summaryLoading" style="color:#888; font-size:13px; display:none;">Looking at your spending…</div>
<div id="summaryResult" style="margin-top:16px;"></div>

<script>
  const supabaseClient = window.supabase.createClient(
    'https://grsrjczmrmtstbsezbxj.supabase.co',
    'sb_publishable_gp0oWf_Ao0N9UxOwtKxi9g_-U23nCyL'
  );

  async function signInWithPassword() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    const statusEl = document.getElementById('authStatus');
    if (error) {
      statusEl.textContent = 'Error: ' + error.message;
      statusEl.style.color = '#C0392B';
    } else {
      statusEl.textContent = 'Signed in with password';
      statusEl.style.color = '#2E7D32';
      statusEl.style.fontWeight = '600';
    }
  }

  async function signIn() {
    const email = document.getElementById('email').value;
    const btn = event.target;
    btn.textContent = 'Sending...';
    const { error } = await supabaseClient.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    const statusEl = document.getElementById('authStatus');
    if (error) {
      statusEl.textContent = 'Error: ' + error.message;
      statusEl.style.color = '#C0392B';
      btn.textContent = 'Send magic link';
    } else {
      statusEl.textContent = 'Link sent — check your email, click it, then come back to this tab.';
      statusEl.style.color = '#2E7D32';
      statusEl.style.fontWeight = '600';
      btn.textContent = 'Link sent ✓';
    }
  }

  async function loadCategories() {
    const { data, error } = await supabaseClient.from('categories').select('*').order('sort_order');
    if (error) {
      document.getElementById('catError').textContent = 'Category load error: ' + error.message;
      return;
    }
    if (!data || data.length === 0) {
      document.getElementById('catError').textContent = 'No categories returned — check RLS policy on categories table.';
      return;
    }
    const select = document.getElementById('category');
    select.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  }

  async function addTransaction() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      document.getElementById('status').textContent = 'Please sign in first (check your email for the link).';
      return;
    }

    const amount = document.getElementById('amount').value;
    const category_id = document.getElementById('category').value;
    const note = document.getElementById('note').value;

    const res = await fetch('/api/transactions/create', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ amount: parseFloat(amount), category_id, note })
    });

    const result = await res.json();
    document.getElementById('status').textContent = res.ok
      ? 'Added!'
      : 'Error: ' + result.error;

    if (res.ok) loadTransactions();
  }

  async function loadTransactions() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;

    const { data } = await supabaseClient
      .from('transactions')
      .select('*, categories(name)')
      .order('created_at', { ascending: false })
      .limit(10);

    document.getElementById('transactionList').innerHTML =
      '<h3>Recent transactions</h3>' +
      (data ?? []).map(t =>
        `<div class="row"><span>${t.categories?.name ?? 'Other'} ${t.note ? '· ' + t.note : ''}</span><span>£${t.amount}</span></div>`
      ).join('');
  }

  async function checkSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const statusEl = document.getElementById('authStatus');
    if (session) {
      statusEl.textContent = 'Signed in as ' + session.user.email;
      statusEl.style.color = '#2E7D32';
      statusEl.style.fontWeight = '600';
    }
  }

  async function generateSummary() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      document.getElementById('summaryResult').textContent = 'Please sign in first.';
      return;
    }

    document.getElementById('summaryLoading').style.display = 'block';
    document.getElementById('summaryResult').innerHTML = '';

    try {
      const res = await fetch('/api/summary/generate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${session.access_token}`
        }
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById('summaryResult').innerHTML =
          '<span style="color:#C0392B;">Error: ' + JSON.stringify(data) + '</span>';
        return;
      }

      document.getElementById('summaryResult').innerHTML = `
        <div style="background:#F0F0EE; border-radius:10px; padding:16px;">
          <p style="font-weight:600; font-size:16px; margin:0 0 12px;">${data.summary}</p>
          <p style="font-size:13px; color:#666; margin:0 0 4px;">INSIGHT</p>
          <p style="margin:0 0 12px;">${data.insight}</p>
          <p style="font-size:13px; color:#666; margin:0 0 4px;">NEXT STEP</p>
          <p style="margin:0;">${data.next_step}</p>
        </div>
      `;
    } catch (err) {
      document.getElementById('summaryResult').innerHTML =
        '<span style="color:#C0392B;">Error: ' + err.message + '</span>';
    } finally {
      document.getElementById('summaryLoading').style.display = 'none';
    }
  }

  loadCategories();
  loadTransactions();
  checkSession();
</script>

</body>
</html>
